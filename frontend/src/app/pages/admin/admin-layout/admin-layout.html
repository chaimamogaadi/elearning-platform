<div class="admin-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">🎓</span>
      <span class="logo-text">ELearn Admin</span>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/admin/overview" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📊</span>
        <span>Overview</span>
      </a>
      <a routerLink="/admin/users" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">👥</span>
        <span>Users</span>
      </a>
      <a routerLink="/admin/courses" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📚</span>
        <span>Courses</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="admin-info">
        <div class="admin-avatar">{{ user?.username?.charAt(0)?.toUpperCase() }}</div>
        <div>
          <div class="admin-name">{{ user?.username }}</div>
          <div class="admin-role">Administrator</div>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()">
        🚪 Logout
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="admin-main">
    <router-outlet />
  </main>

</div>
